<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onko Naapurisi Natsi?</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 60px;
      background: #f4f4f4;
      color: #333;
    }
    h1 {
      color: #c00;
      margin-bottom: 10px;
    }
    input {
      padding: 14px;
      font-size: 18px;
      width: 320px;
      border: 2px solid #ccc;
      border-radius: 8px;
      margin: 10px 0;
    }
    button {
      padding: 14px 32px;
      font-size: 18px;
      background: #c00;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px;
    }
    button:hover {
      background: #a00;
    }
    #result {
      margin-top: 40px;
      font-size: 28px;
      font-weight: bold;
      min-height: 50px;
    }
    .footer {
      margin-top: 70px;
      font-size: 16px;
      color: #555;
      line-height: 1.6;
    }
    .footer a {
      color: #c00;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Onko naapurisi natsi?</h1>
  <p>Kirjoita nimi alle ja tarkista</p>

  <input type="text" id="nameInput" placeholder="Kirjoita nimi..." autocomplete="off">
  <br>
  <button onclick="checkName()">🔍 Tarkista</button>

  <p id="result"></p>

  <!-- Yhteysteksti -->
  <div class="footer">
    <p>
      Listalta poistopyynnöt käsitellään tapauskohtaisesti.  
Ota yhteyttä: natsikone@gmail.com.<br><br>
      <strong><a href="mailto:natsikone@gmail.com">natsikone@gmail.com</a></strong>
    </p>
  </div>

  <script>
    const blockedNames = [
      "ville manninen",
      "ville manninen ",
      "vile manninen",
      "vilie manninen",
      "villemaninen"
    ];

    function checkName() {
      const inputField = document.getElementById("nameInput");
      const result = document.getElementById("result");
      
      let name = inputField.value.trim().toLowerCase();

      if (name === "") {
        result.style.color = "#f80";
        result.innerHTML = "⚠ Kirjoita joku nimi ensin!";
        return;
      }

      if (blockedNames.includes(name)) {
        result.style.color = "#0a0";
        result.innerHTML = "✖ Ei löydy Natsi-listalta";
      } else {
        result.style.color = "#c00";
        result.innerHTML = "✔ Löytyy Natsi-listalta";
      }
    }

    document.getElementById("nameInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") checkName();
    });
  </script>
</body>
</html>
