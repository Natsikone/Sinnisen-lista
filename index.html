<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onko Naapurisi Natsi?</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 60px;
      background: #f4f4f4;
      color: #333;
    }

    h1 {
      color: #c00;
      margin-bottom: 10px;
    }

    .input-area {
      max-width: 400px;
      margin: 30px auto;
      padding: 0 20px;
    }

    input {
      padding: 14px;
      font-size: 18px;
      width: 100%;
      border: 2px solid #ccc;
      border-radius: 8px;
      display: block;
      margin: 10px 0;
    }

    button {
      padding: 14px 32px;
      font-size: 18px;
      background: #c00;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px auto;
      display: block;
    }

    button:hover {
      background: #a00;
    }

    #result {
      margin-top: 40px;
      font-size: 28px;
      font-weight: bold;
      min-height: 50px;
    }

    .footer {
      margin-top: 70px;
      font-size: 16px;
      color: #555;
      line-height: 1.6;
    }

    .footer a {
      color: #c00;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <h1>Onko Naapurisi Natsi?</h1>

  <div class="input-area">
    <input type="text" id="nameInput" placeholder="etunimi sukunimi" autocomplete="off">
    <button onclick="checkName()">🔍 Tarkista</button>
  </div>

  <div id="result"></div>

  <div class="footer">
    <p>
      Ota yhteyttä: <br><br>
      <strong><a href="mailto:natsikone@gmail.com">natsikone@gmail.com</a></strong>
    </p>
  </div>

  <script>
    const blockedNames = [
      "ville manninen",
      "vile manninen",
      "vilie manninen",
      "villemaninen",
      "jouni jarvinen",
      "jouni järvinen",
      "aki tolmunen",
      "aki solmunen",
      "mikko leskinen",
      "miko leskinen"
    ];

    function checkName() {
      const inputField = document.getElementById("nameInput");
      const result = document.getElementById("result");

      let name = inputField.value.trim().toLowerCase();

      if (name === "") {
        result.style.color = "#f80";
        result.textContent = "Kirjoita nimi ensin";
        return;
      }

      if (blockedNames.includes(name)) {
        result.style.color = "#0a0";
        result.textContent = "Ei löydy Natsi-listalta";
      } else {
        result.style.color = "#c00";
        result.textContent = "Löytyy Natsi-listalta";
      }
    }

    document.getElementById("nameInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") checkName();
    });
  </script>

</body>
</html>
